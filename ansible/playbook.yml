- name: Deploy to Tomcat
  hosts: web
  become: yes
  tasks:
    - name: Copy WAR file to Tomcat
      copy:
        src: /var/snap/jenkind/4865/workspace/ansible
        dest: /path/on/remote/tomcat/webapps/
        remote_src: yes

    - name: Restart Tomcat
      systemd:
        name: tomcat
        state: restarted
